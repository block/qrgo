name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  actions: write

jobs:
  spm:
    strategy:
      matrix:
        os: ["macos-15"]
        compilation_mode: ["release"]
        xcode_version: ["16.3"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Mount SPM cache
        uses: actions/cache@v3
        with:
            path: .build
            key: ${{ matrix.os }}-${{ matrix.compilation_mode }}-${{ matrix.xcode_version }}-spm-${{ hashFiles('**/Package.resolved') }}
            restore-keys: |
                ${{ matrix.os }}-${{ matrix.compilation_mode }}-${{ matrix.xcode_version }}-spm-

      - name: Select XCode
        run: |
            echo "Available Xcode versions: $(ls /Applications | grep Xcode)"
            echo "Xcode is currently: $(sudo xcode-select -p)"
            sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode_version }}.app
            echo "Xcode is now: $(sudo xcode-select -p)"

      - name: "Build (SPM for ${{ matrix.os }}, ${{ matrix.compilation_mode }}) with Xcode ${{ matrix.xcode_version }}"
        run: |
            swift build -c ${{ matrix.compilation_mode }}

      - name: Create release tarball
        run: |
          tar -czf qrgo-release.tar.gz -C .build/release .

      - name: Generate sha256 for tarball
        id: generate_hash
        run: |
          echo "file_hash=$(shasum -a 256 qrgo-release.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create "${{ github.ref_name }}" \
            ./qrgo-release.tar.gz \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate token for tap release
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BLOCK_HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.BLOCK_HOMEBREW_TAP_PRIVATE_KEY }}
          owner: block
          repositories: homebrew-tap

      - name: Trigger Formula Bump
        run: |
          gh workflow run bump-formula.yaml \
            --repo block/homebrew-tap \
            -f repo=block/qrgo \
            -f formula=qrgo \
            -f tag=${{ github.ref_name }} \
            -f artifact_url=https://github.com/block/qrgo/releases/download/${{ github.ref_name }}/qrgo-release.tar.gz \
            -f sha256=${{ steps.generate_hash.outputs.file_hash }}
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
